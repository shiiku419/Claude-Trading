exchange:
  name: binance
  testnet: false

trading:
  pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
  timeframes:
    - 5m
    - 15m
  mode: live

risk:
  max_position_pct: 0.01
  daily_loss_warning_pct: 0.02
  daily_loss_critical_pct: 0.03
  loss_consecutive_breaches: 3
  max_open_positions: 2
  max_exposure_pct: 0.05
  kill_switch_enabled: true

claude:
  model: claude-sonnet-4-5-20250929
  calls_per_day: 4
  regime_ttl_hours: 12.0

database:
  url: "postgresql+asyncpg://user:postgres@db:5432/trading"
  redis_url: "redis://redis:6379/0"

paper:
  initial_balance: 10000.0
  fill_model: next_bar_open
  slippage_pct: 0.0005
  fee_pct: 0.0005

alerts:
  rate_limit_seconds: 60.0

monitoring:
  health_check_interval_seconds: 30

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080
